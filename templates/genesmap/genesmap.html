                                                // Configurar botón de inicio del tour
                                                const startBtn = document.getElementById('startTourBtn');
                                                if (startBtn) {
                                                    startBtn.addEventListener('click', () => {
                                                        driverObj.setSteps(steps);
                                                        driverObj.drive();
                                                    });
                                                    console.log('✅ Botón de tour configurado');
                                                }
                                               
                                            } catch (error) {
                                                console.error('Error con driver.js.driver:', error);
                                                tryAlternativeApproach();
                                            }
                                        }, 1000);
                                    });

                                    function tryAlternativeApproach() {
                                        console.log('Probando enfoque alternativo...');

                                        // Intentar diferentes formas
                                        const drivers = [
                                            () => window.driver?.(),
                                            () => window.driver?.js?.driver?.(),
                                            () => window.driverjs?.driver?.()
                                        ];

                                        for (let i = 0; i < drivers.length; i++) {
                                            try {
                                                const driverObj = drivers[i]();
                                                if (driverObj) {
                                                    console.log(`✅ Driver inicializado con enfoque ${i + 1}`);
                                                    setupTour(driverObj);
                                                    return;
                                                }
                                            } catch (e) {
                                                console.log(`❌ Enfoque ${i + 1} falló:`, e.message);
                                            }
                                        }

                                        console.error('❌ Todos los enfoques fallaron');
                                    }

                                    function setupTour(driverObj) {
                                        // Definir todos los pasos del tour (misma estructura que arriba)
                                        const steps = [
                                            {
                                                element: '#map',
                                                popover: {
                                                    title: '🗺️ Mapa Principal',
                                                    description: 'Este es el mapa interactivo donde se visualizan todas las migraciones humanas y la expansión de los alelos CYP2D6.',
                                                    side: "bottom",
                                                    align: 'center'
                                                }
                                            },
                                            {
                                                element: '#btreload',
                                                popover: {
                                                    title: '🔄 Cargar Datos',
                                                    description: 'Haz clic aquí para aplicar los filtros seleccionados.',
                                                    side: "bottom",
                                                    align: 'center'
                                                }
                                            },
                                            {
                                                element: '#timeRange',
                                                popover: {
                                                    title: '⏰ Rango de Tiempo',
                                                    description: 'Selecciona diferentes períodos históricos para visualizar migraciones específicas.',
                                                    side: "bottom",
                                                    align: 'center'
                                                }
                                            },
                                            {
                                                element: '#toggleTimeRangePanel',
                                                popover: {
                                                    title: '📊 Panel de Rangos',
                                                    description: 'Muestra/oculta panel lateral con opciones de tiempo.',
                                                    side: "left",
                                                    align: 'start'
                                                }
                                            },
                                            {
                                                element: '#startTourBtn',
                                                popover: {
                                                    title: '❓ Ayuda',
                                                    description: 'Reinicia este tour cuando lo necesites.',
                                                    side: "bottom",
                                                    align: 'center'
                                                }
                                            }
                                        ];

                                        // Configurar botón
                                        const startBtn = document.getElementById('startTourBtn');
                                        if (startBtn) {
                                            startBtn.addEventListener('click', () => {
                                                if (driverObj.setSteps) {
                                                    driverObj.setSteps(steps);
                                                    driverObj.drive();
                                                } else if (driverObj.defineSteps) {
                                                    driverObj.defineSteps(steps);
                                                    driverObj.start();
                                                }
                                            });
                                        }

                                        // Auto-inicio
                                        if (!sessionStorage.getItem('tourShown')) {
                                            setTimeout(() => {
                                                if (driverObj.setSteps) {
                                                    driverObj.setSteps(steps);
                                                    driverObj.drive();
                                                } else if (driverObj.defineSteps) {
                                                    driverObj.defineSteps(steps);
                                                    driverObj.start();
                                                }
                                                sessionStorage.setItem('tourShown', 'true');
                                            }, 2000);
                                        }
                                    }
                                </script>
                            </div>
                            <!-- /.card-body -->
                        </div>
                        <!-- /.card -->
                    </div>
                    <!-- /.col -->
                </div>
                <!-- /.row -->
            </div>
            <!-- /.container-fluid-->
        </section>
    </div>

{% endblock %}
